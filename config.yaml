camera:
  ip: "192.168.x.x"        # または環境変数 CAMERA_IP
  http_port: 8000
  username: "admin"         # または環境変数 CAMERA_USER
  password: "your_password" # または環境変数 CAMERA_PASSWORD（推奨）
  rtsp_port: 554
  main_stream_suffix: "/h264Preview_01_main"
  sub_stream_suffix: "/h264Preview_01_sub"

motion_detection:
  enabled: true
  method: "api"
  polling_interval: 0.5
  cooldown: 3.0

output:
  base_dir: "output"
  save_images: true
  save_masks: true
  save_json: true
  filename_format: "%Y%m%d_%H%M%S"
  max_captures: 1000

system:
  log_level: "INFO"

annotation:
  device: "cuda"
  prompt: "hamster"
  confidence_threshold: 0.5
  recalculate_bbox_from_mask: false

api:
  host: "127.0.0.1"
  port: 8000